<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIC - Connexion</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --red:#c00000; --red2:#e00000; --bg:#f4f4f4; --white:#fff; --gray:#8a94a6; --border:#dde2ec; --text:#1a1f36; }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);}
        body{background:linear-gradient(160deg,#2a0000 0%,#4a0000 50%,#2a0000 100%);min-height:100vh;}
        .login-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
        .login-header{text-align:center;margin-bottom:28px;animation:fadeUp .5s ease;}
        .cic-logo-box{background:#fff;border-radius:16px;padding:14px 28px;display:inline-block;margin-bottom:14px;box-shadow:0 8px 28px rgba(0,0,0,0.3);}
        .cic-logo-box img{height:52px;display:block;}
        .login-tagline{color:rgba(255,255,255,0.55);font-size:.82rem;margin-top:4px;}
        .login-card{background:#fff;border-radius:20px;padding:28px 22px 24px;width:100%;max-width:380px;box-shadow:0 12px 48px rgba(0,0,0,0.25);animation:fadeUp .5s ease .1s both;}
        .login-card-title{font-size:.92rem;font-weight:700;color:var(--red);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);letter-spacing:.04em;}
        .login-error{display:none;background:#fdecea;border:1px solid #f5c6c2;border-radius:10px;padding:10px 13px;margin-bottom:14px;font-size:.82rem;color:var(--red);align-items:center;gap:8px;}
        .login-error.show{display:flex;}
        .field{margin-bottom:16px;}
        .field label{display:block;font-size:.73rem;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
        .input-wrap{position:relative;}
        .ico-left{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:.88rem;pointer-events:none;}
        .input-wrap input{width:100%;padding:12px 44px 12px 38px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;color:var(--text);background:#fafbff;outline:none;transition:.2s;font-family:inherit;}
        .input-wrap input:focus{border-color:var(--red);background:#fff;box-shadow:0 0 0 3px rgba(192,0,0,0.10);}
        .input-wrap input::placeholder{color:#c0c8da;}
        .btn-toggle-pass{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:#eef1f8;border:1.5px solid var(--border);border-radius:7px;width:30px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);font-size:.82rem;transition:.2s;}
        .btn-toggle-pass:hover{background:var(--red);color:#fff;border-color:var(--red);}
        .login-options{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
        .remember-me{display:flex;align-items:center;gap:7px;font-size:.8rem;color:var(--gray);cursor:pointer;}
        .remember-me input[type=checkbox]{width:15px;height:15px;accent-color:var(--red);}
        .forgot-link{font-size:.8rem;color:var(--red);font-weight:500;cursor:pointer;}
        .forgot-link:hover{text-decoration:underline;}
        .btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;border:none;border-radius:10px;font-size:.93rem;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:.22s;box-shadow:0 4px 16px rgba(192,0,0,0.28);display:flex;align-items:center;justify-content:center;gap:10px;}
        .btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(192,0,0,0.35);}
        .login-footer{margin-top:22px;text-align:center;animation:fadeUp .5s ease .2s both;}
        .badges{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px;}
        .badge-secure{display:flex;align-items:center;gap:5px;font-size:.72rem;color:rgba(255,255,255,0.45);}
        .badge-secure i{color:#c00000;}
        .login-footer p{font-size:.72rem;color:rgba(255,255,255,0.3);}
        .spinner-overlay{position:fixed;inset:0;background:rgba(42,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;}
        .spinner-overlay.show{opacity:1;pointer-events:all;}
        .spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-header">
            <div class="cic-logo-box">
                <img src="https://i.ibb.co/nMFyVywT/Logo-CIC-2006.jpg" alt="Logo CIC">
            </div>
            <p class="login-tagline">La banque de votre région</p>
        </div>
        <div class="login-card">
            <h2 class="login-card-title"><i class="fas fa-lock" style="margin-right:8px;font-size:.85rem;"></i>CONNEXION</h2>
            <div class="login-error" id="login-error">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="error-msg">Identifiant ou mot de passe incorrect.</span>
            </div>
            <form id="login-form" onsubmit="doLogin(event)">
                <div class="field">
                    <label>Numéro client</label>
                    <div class="input-wrap">
                        <i class="fas fa-user ico-left"></i>
                        <input type="text" id="input-user" placeholder="Votre numéro client" autocomplete="username" required>
                    </div>
                </div>
                <div class="field">
                    <label>Mot de passe</label>
                    <div class="input-wrap">
                        <i class="fas fa-key ico-left"></i>
                        <input type="password" id="input-pass" placeholder="••••••••" autocomplete="current-password" required>
                        <button type="button" class="btn-toggle-pass" onclick="togglePassword()">
                            <i class="fas fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>
                <div class="login-options">
                    <label class="remember-me"><input type="checkbox" id="remember-me"> Se souvenir de moi</label>
                    <span class="forgot-link" onclick="showForgot()">Mot de passe oublié ?</span>
                </div>
                <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> SE CONNECTER</button>
            </form>
        </div>
        <div class="login-footer">
            <div class="badges">
                <div class="badge-secure"><i class="fas fa-shield-alt"></i> Connexion SSL</div>
                <div class="badge-secure"><i class="fas fa-check-circle"></i> Données chiffrées</div>
            </div>
            <p>© 2024 CIC — Simulation bancaire · Aucune transaction réelle</p>
        </div>
    </div>
    <div class="spinner-overlay" id="spinner"><div class="spinner"></div></div>
    <script>
        const USERS = [{ login: 'DjanIsFake', password: '44454241' }];
        function doLogin(e) {
            e.preventDefault();
            var user = document.getElementById('input-user').value.trim();
            var pass = document.getElementById('input-pass').value;
            hideError(); showSpinner(true);
            setTimeout(function() {
                var found = USERS.find(function(u){return u.login===user&&u.password===pass;});
                if (found) {
                    if (document.getElementById('remember-me').checked) localStorage.setItem('cic_user', user);
                    window.location.href = 'dashboard.html';
                } else {
                    showSpinner(false);
                    showError('Numéro client ou mot de passe incorrect. Veuillez réessayer.');
                    document.getElementById('input-pass').value = '';
                    document.getElementById('input-pass').focus();
                }
            }, 900);
        }
        function togglePassword() {
            var i = document.getElementById('input-pass'), ic = document.getElementById('eye-icon');
            if (i.type==='password'){i.type='text';ic.className='fas fa-eye-slash';}
            else{i.type='password';ic.className='fas fa-eye';}
        }
        function showForgot(){alert('Pour réinitialiser votre mot de passe,\ncontactez le CIC au 0 800 836 510.');}
        function showError(m){document.getElementById('error-msg').textContent=m;document.getElementById('login-error').classList.add('show');}
        function hideError(){document.getElementById('login-error').classList.remove('show');}
        function showSpinner(v){document.getElementById('spinner').classList.toggle('show',v);}
        window.onload=function(){var s=localStorage.getItem('cic_user');if(s){document.getElementById('input-user').value=s;document.getElementById('remember-me').checked=true;document.getElementById('input-pass').focus();}};
    </script>
</body>
</html>
