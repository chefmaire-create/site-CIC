<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CIC - Virement Express</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{--red:#c00000;--red2:#e00000;--bg:#f4f4f4;--white:#fff;--gray:#8a94a6;--border:#dde2ec;--text:#1a1f36;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}
header{background:linear-gradient(145deg,#c00000,#e00000);padding:0 0 24px;border-radius:0 0 24px 24px;box-shadow:0 6px 24px rgba(192,0,0,0.25);position:relative;overflow:hidden;}
header::before{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);}
.top-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;position:relative;z-index:1;}
.cic-header-logo{background:#fff;border-radius:10px;padding:6px 14px;display:flex;align-items:center;}
.cic-header-logo img{height:32px;display:block;}
.logout-btn{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.28);color:#fff;width:38px;height:38px;border-radius:50%;font-size:.95rem;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;}
.logout-btn:hover{background:rgba(255,255,255,0.30);transform:rotate(15deg);}
.user-profile{padding:6px 20px 0;position:relative;z-index:1;}
.user-profile p{font-size:.75rem;color:rgba(255,255,255,0.65);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.user-profile h2{font-size:1.9rem;font-weight:700;color:#fff;}
main{padding:20px 14px 40px;}
.action-card{margin-bottom:20px;}
.btn-virement{width:100%;padding:16px 20px;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;border:none;border-radius:14px;font-size:.95rem;font-weight:700;letter-spacing:.05em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 20px rgba(192,0,0,0.28);transition:.22s;}
.btn-virement:hover{transform:translateY(-2px);}
.history-section{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(192,0,0,0.08);overflow:hidden;}
.history-header{padding:14px 16px;border-bottom:1px solid var(--border);background:#fdf5f5;}
.history-header h3{font-size:.75rem;font-weight:700;color:var(--red);letter-spacing:.07em;}
.transaction-list{min-height:80px;}
.empty-state{padding:32px 20px;text-align:center;color:var(--gray);font-size:.86rem;}
.transaction-item{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid #f5f0f0;cursor:pointer;transition:.18s;}
.transaction-item:last-child{border:none;}
.transaction-item:hover{background:#fdf5f5;}
.t-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.t-icon.sent{background:#fde8e8;color:var(--red);}
.t-icon.blocked{background:#fdecea;color:#8b0000;}
.t-info{flex:1;min-width:0;}
.t-name{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-ref{font-size:.7rem;color:var(--gray);margin-top:2px;}
.t-right{text-align:right;flex-shrink:0;}
.t-amount{font-weight:700;font-size:.92rem;color:var(--red);}
.t-amount.blocked-amt{color:#8b0000;}
.t-badge{display:inline-block;font-size:.63rem;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:3px;}
.badge-sent{background:#fde8e8;color:var(--red);}
.badge-blocked{background:#fdecea;color:#8b0000;}
.modal-overlay{position:fixed;inset:0;background:rgba(42,0,0,0.65);backdrop-filter:blur(5px);z-index:1000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-card{background:#fff;border-radius:22px 22px 0 0;padding:26px 20px 34px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;transform:translateY(40px);transition:transform .28s cubic-bezier(.32,1.2,.5,1);box-shadow:0 -8px 40px rgba(0,0,0,0.15);}
.modal-overlay.open .modal-card{transform:translateY(0);}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.modal-head h3{font-size:.95rem;font-weight:700;color:var(--red);}
.modal-head button{background:#f0f2f7;border:none;width:30px;height:30px;border-radius:50%;font-size:1.2rem;color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:.73rem;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.field input{width:100%;padding:12px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;color:var(--text);background:#fafbff;outline:none;transition:.2s;font-family:inherit;}
.field input:focus{border-color:var(--red);background:#fff;box-shadow:0 0 0 3px rgba(192,0,0,0.10);}
.field input::placeholder{color:#c0c8da;}
.submit-red{width:100%;margin-top:6px;padding:14px;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;border:none;border-radius:11px;font-size:.92rem;font-weight:700;cursor:pointer;transition:.22s;display:flex;align-items:center;justify-content:center;gap:8px;}
.submit-red:hover{transform:translateY(-1px);}
.submit-dark{width:100%;margin-top:6px;padding:14px;background:linear-gradient(135deg,#8b0000,#a00000);color:#fff;border:none;border-radius:11px;font-size:.92rem;font-weight:700;cursor:pointer;transition:.22s;display:flex;align-items:center;justify-content:center;gap:8px;}
.submit-dark:hover{transform:translateY(-1px);}
.block-card{text-align:center;padding-top:32px;}
.block-icon{width:66px;height:66px;background:linear-gradient(135deg,#8b0000,#a00000);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.7rem;color:#fff;margin:0 auto 16px;}
.block-card h3{font-size:1.05rem;font-weight:800;color:#8b0000;margin-bottom:8px;}
.block-card p{font-size:.83rem;color:var(--gray);line-height:1.6;margin-bottom:18px;padding:0 8px;}
.block-card .field{text-align:left;}
.detail-ref{font-size:.72rem;color:var(--gray);background:#f5f0f0;border-radius:6px;padding:3px 10px;display:inline-block;margin-bottom:16px;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f0f0;font-size:.86rem;}
.detail-row:last-of-type{border:none;}
.dl{color:var(--gray);font-size:.76rem;text-transform:uppercase;letter-spacing:.04em;}
.dv{font-weight:600;color:var(--text);text-align:right;max-width:60%;word-break:break-all;}
.dv.big-amount{color:var(--red);font-size:1.05rem;}
.dv.red{color:#8b0000;}
.btn-block-virement{width:100%;margin-top:18px;padding:14px;background:linear-gradient(135deg,#8b0000,#a00000);color:#fff;border:none;border-radius:11px;font-size:.9rem;font-weight:700;cursor:pointer;transition:.22s;display:flex;align-items:center;justify-content:center;gap:9px;}
.btn-block-virement:hover{transform:translateY(-1px);}
.btn-block-virement.already-blocked{background:linear-gradient(135deg,#95a5a6,#7f8c8d);cursor:not-allowed;transform:none;}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--text);color:#fff;padding:11px 20px;border-radius:28px;font-size:.83rem;font-weight:500;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,0.22);transition:transform .3s cubic-bezier(.32,1.2,.5,1);white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--red);}
.toast.error{background:#8b0000;}
.toast.info{background:#2980b9;}
.spinner-overlay{position:fixed;inset:0;background:rgba(42,0,0,0.5);z-index:9998;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;}
.spinner-overlay.show{opacity:1;pointer-events:all;}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<header>
  <div class="top-header">
    <div class="cic-header-logo">
      <img src="https://i.ibb.co/nMFyVywT/Logo-CIC-2006.jpg" alt="CIC">
    </div>
    <button class="logout-btn" onclick="window.location.href='index.html'"><i class="fas fa-power-off"></i></button>
  </div>
  <div class="user-profile"><p>Compte de depot</p><h2>800 000 000 EUR</h2></div>
</header>
<main>
  <div class="action-card">
    <button class="btn-virement" onclick="openModal('virement-modal')"><i class="fas fa-paper-plane"></i> FAIRE UN VIREMENT</button>
  </div>
  <section class="history-section">
    <div class="history-header"><h3>HISTORIQUE DES OPERATIONS</h3></div>
    <div id="transaction-list" class="transaction-list"><div class="empty-state">Aucun virement recent</div></div>
  </section>
</main>
<div id="virement-modal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-head"><h3>Details du destinataire</h3><button onclick="closeModal('virement-modal')">&times;</button></div>
    <form id="virement-form">
      <div class="field"><label>Nom de l emetteur</label><input type="text" id="nom-emetteur" placeholder="Ex: CIC Admin" required></div>
      <div class="field"><label>Nom du beneficiaire</label><input type="text" id="nom-proprio" placeholder="Nom complet" required></div>
      <div class="field"><label>Gmail du destinataire</label><input type="email" id="email-dest" placeholder="exemple@gmail.com" required></div>
      <div class="field"><label>IBAN / RIB</label><input type="text" id="iban-dest" placeholder="Saisir IBAN" required></div>
      <div class="field"><label>Montant (EUR)</label><input type="number" id="montant-virement" placeholder="0.00" min="0.01" step="0.01" required></div>
      <button type="submit" class="submit-red"><i class="fas fa-check-circle"></i> CONFIRMER LE VIREMENT</button>
    </form>
  </div>
</div>
<div id="detail-modal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-head"><h3>Details du virement</h3><button onclick="closeModal('detail-modal')">&times;</button></div>
    <div id="detail-content"></div>
  </div>
</div>
<div id="annulation-modal" class="modal-overlay">
  <div class="modal-card block-card">
    <div class="block-icon"><i class="fas fa-lock"></i></div>
    <h3>VIREMENT SUSPENDU</h3>
    <p>Definir les frais de deblocage pour notifier le destinataire :</p>
    <form id="annulation-form">
      <div class="field"><label>Frais de deblocage (EUR)</label><input type="number" id="montant-deblocage" placeholder="Montant des frais" min="0.01" step="0.01" required></div>
      <button type="submit" class="submit-dark"><i class="fas fa-lock"></i> BLOQUER ET ENVOYER GMAIL</button>
    </form>
  </div>
</div>
<div class="toast" id="app-toast"></div>
<div class="spinner-overlay" id="app-spinner"><div class="spinner"></div></div>
<script>
const EJ_PUBLIC_KEY="JU1fNDcHKEglyA3Mh",EJ_SERVICE_ID="service_a36ttrr",EJ_TPL_VIREMENT="template_8r46fib",EJ_TPL_BLOCAGE="template_1v2v0we";
let virements=[],virementActif=null;
emailjs.init(EJ_PUBLIC_KEY);
document.getElementById("virement-form").addEventListener("submit",soumettreVirement);
document.getElementById("annulation-form").addEventListener("submit",soumettreBlockage);
document.querySelectorAll(".modal-overlay").forEach(function(o){o.addEventListener("click",function(e){if(e.target===o)closeModal(o.id);});});
function openModal(id){var el=document.getElementById(id);if(el)el.classList.add("open");}
function closeModal(id){var el=document.getElementById(id);if(el)el.classList.remove("open");}
async function soumettreVirement(e){
  e.preventDefault();
  var a=document.getElementById("nom-emetteur").value.trim();
  var b=document.getElementById("nom-proprio").value.trim();
  var c=document.getElementById("email-dest").value.trim();
  var d=document.getElementById("iban-dest").value.trim();
  var m=parseFloat(document.getElementById("montant-virement").value);
  if(!a||!b||!c||!d||isNaN(m)||m<=0){showToast("Veuillez remplir tous les champs.","error");return;}
  var ref="CIC-"+Date.now().toString().slice(-9);
  var dt=new Date().toLocaleString("fr-FR",{timeZone:"Europe/Paris"});
  var v={ref:ref,nomEmetteur:a,nomDest:b,emailDest:c,ibanDest:d,montant:m,date:dt,statut:"envoye",montantBlockage:null};
  showSpinner(true);
  await envoyerEmailVirement(v);
  virements.unshift(v);renderHistorique();
  closeModal("virement-modal");
  document.getElementById("virement-form").reset();
  showSpinner(false);
  showToast("Virement envoye ! Email transmis au destinataire.","success");
}
async function soumettreBlockage(e){
  e.preventDefault();if(!virementActif)return;
  var mb=parseFloat(document.getElementById("montant-deblocage").value);
  if(isNaN(mb)||mb<=0){showToast("Saisissez un montant valide.","error");return;}
  showSpinner(true);
  virementActif.statut="bloque";virementActif.montantBlockage=mb;
  await envoyerEmailBlockage(virementActif);
  renderHistorique();closeModal("annulation-modal");closeModal("detail-modal");
  document.getElementById("annulation-form").reset();
  virementActif=null;showSpinner(false);
  showToast("Virement bloque ! Email envoye au destinataire.","info");
}
function renderHistorique(){
  var l=document.getElementById("transaction-list");
  if(virements.length===0){l.innerHTML="<div class=empty-state>Aucun virement recent</div>";return;}
  var h="";
  for(var i=0;i<virements.length;i++){
    var v=virements[i],bl=v.statut==="bloque";
    h+="<div class=transaction-item onclick=ouvrirDetail('"+v.ref+"')>"+
      "<div class="t-icon "+(bl?"blocked":"sent")+""><i class="fas "+(bl?"fa-lock":"fa-paper-plane")+""></i></div>"+
      "<div class=t-info><div class=t-name>"+esc(v.nomDest)+"</div><div class=t-ref>"+v.ref+"</div></div>"+
      "<div class=t-right><div class="t-amount"+(bl?" blocked-amt":"")+"">"+fmt(v.montant)+"</div>"+
      "<span class="t-badge "+(bl?"badge-blocked":"badge-sent")+"">"+( bl?"BLOQUE":"ENVOYE")+"</span></div></div>";
  }
  l.innerHTML=h;
}
function ouvrirDetail(ref){
  virementActif=null;
  for(var i=0;i<virements.length;i++){if(virements[i].ref===ref){virementActif=virements[i];break;}}
  if(!virementActif)return;
  var v=virementActif,b=v.statut==="bloque";
  var h="<div class=detail-ref>Ref. "+v.ref+"</div>"+
    row("Emetteur",esc(v.nomEmetteur))+row("Beneficiaire",esc(v.nomDest))+
    row("Email",esc(v.emailDest))+row("IBAN",esc(v.ibanDest))+
    "<div class=detail-row><span class=dl>Montant</span><span class="dv big-amount">"+fmt(v.montant)+"</span></div>"+
    row("Date",v.date)+
    "<div class=detail-row><span class=dl>Statut</span><span class="dv"+(b?" red":"")+"">"+( b?"Bloque":"Envoye")+"</span></div>";
  if(b&&v.montantBlockage)h+=row("Frais deblocage","<span style=color:#8b0000>"+fmt(v.montantBlockage)+"</span>");
  h+=b?"<button class="btn-block-virement already-blocked" disabled><i class="fas fa-lock"></i> DEJA BLOQUE</button>":
        "<button class=btn-block-virement onclick=ouvrirBlockage()><i class="fas fa-lock"></i> BLOQUER CE VIREMENT</button>";
  document.getElementById("detail-content").innerHTML=h;
  openModal("detail-modal");
}
function row(l,v){return "<div class=detail-row><span class=dl>"+l+"</span><span class=dv>"+v+"</span></div>";}
function ouvrirBlockage(){closeModal("detail-modal");openModal("annulation-modal");}
async function envoyerEmailVirement(v){
  try{await emailjs.send(EJ_SERVICE_ID,EJ_TPL_VIREMENT,{to_email:v.emailDest,nom:v.nomDest,emetteur:v.nomEmetteur,montant:v.montant.toFixed(2),iban:v.ibanDest,date:v.date});}
  catch(err){console.error(err);showToast("Email non envoye.","error");}
}
async function envoyerEmailBlockage(v){
  try{await emailjs.send(EJ_SERVICE_ID,EJ_TPL_BLOCAGE,{to_email:v.emailDest,nom:v.nomDest,emetteur:v.nomEmetteur,montant:v.montant.toFixed(2),montant_deblocage:v.montantBlockage.toFixed(2),date:v.date});}
  catch(err){console.error(err);showToast("Email non envoye.","error");}
}
function fmt(n){return Number(n).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" EUR";}
function esc(s){var d=document.createElement("div");d.appendChild(document.createTextNode(s));return d.innerHTML;}
function showToast(msg,type){var t=document.getElementById("app-toast");t.textContent=msg;t.className="toast "+(type||"success");t.classList.add("show");clearTimeout(t._timer);t._timer=setTimeout(function(){t.classList.remove("show");},3500);}
function showSpinner(v){var s=document.getElementById("app-spinner");if(v)s.classList.add("show");else s.classList.remove("show");}
</script>
</body>
</html>
